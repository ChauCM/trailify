name: trailify_dashboard
description: Web dashboard for Trailify audit trail. Connects to your Firestore to investigate user events.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  go_router: ^17.2.2
  google_fonts: ^8.1.0
  intl: ^0.20.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
